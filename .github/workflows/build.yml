name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project IconChanger.xcodeproj -scheme IconChanger

      - name: Compute build number
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD=$(python3 scripts/build-number.py "$VERSION")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

          IS_PRERELEASE="false"
          case "$VERSION" in *pre*|*alpha*|*beta*|*rc*) IS_PRERELEASE="true" ;; esac
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV

      - name: Build (CI check)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          xcodebuild build \
            -project IconChanger.xcodeproj \
            -scheme IconChanger \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild archive \
            -project IconChanger.xcodeproj \
            -scheme IconChanger \
            -configuration Release \
            -archivePath build/IconChanger.xcarchive \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} \
            -quiet

      - name: Export and create DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp -R build/IconChanger.xcarchive/Products/Applications/IconChanger.app build/
          mkdir -p build/dmg
          cp -R build/IconChanger.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "IconChanger" -srcfolder build/dmg -ov -format UDZO build/IconChanger.dmg

      - name: Sign DMG with Sparkle EdDSA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.8.0/Sparkle-2.8.0.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle

          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("/tmp/sparkle/bin/sign_update" build/IconChanger.dmg --ed-key-file /tmp/sparkle_key)
          rm -f /tmp/sparkle_key

          echo "DMG_SIZE=$(stat -f%z build/IconChanger.dmg)" >> $GITHUB_ENV
          echo "ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')" >> $GITHUB_ENV

      - name: Generate delta updates
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build/deltas
          cp build/IconChanger.dmg build/deltas/

          for prev_tag in $(gh release list --limit 30 --json tagName -q '.[].tagName'); do
            [ "$prev_tag" = "$TAG" ] && continue
            case "$prev_tag" in v1.4.2|v1.4.1|v1.4.0|v1.3.*|v1.2.*|v1.1.*|v1.0.*) continue ;; esac
            mkdir -p /tmp/prev_dl
            gh release download "$prev_tag" --pattern "IconChanger.dmg" --dir /tmp/prev_dl --clobber 2>/dev/null || continue
            mv /tmp/prev_dl/IconChanger.dmg "build/deltas/IconChanger-${prev_tag#v}.dmg"
            rm -rf /tmp/prev_dl
          done

          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          "/tmp/sparkle/bin/generate_appcast" \
            --ed-key-file /tmp/sparkle_key \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${TAG}/" \
            -o build/deltas/generated-appcast.xml \
            build/deltas/ || echo "generate_appcast failed, skipping deltas"
          rm -f /tmp/sparkle_key

          if ls build/deltas/*.delta 1>/dev/null 2>&1; then
            cp build/deltas/*.delta build/
          fi

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          if [ -n "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" ${PREVIOUS_TAG}..HEAD -- ':!IconChanger/Resources/sparkle.xml' >> CHANGELOG.md
            echo -e "\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG}" >> CHANGELOG.md
          else
            git log --pretty=format:"- %s" >> CHANGELOG.md
          fi

      - name: Update sparkle.xml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PUBDATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          SPARKLE_VERSION="$VERSION" \
          SPARKLE_BUILD="$BUILD_NUMBER" \
          SPARKLE_PUBDATE="$PUBDATE" \
          SPARKLE_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/IconChanger.dmg" \
          SPARKLE_ED_SIG="$ED_SIGNATURE" \
          SPARKLE_DMG_SIZE="$DMG_SIZE" \
          SPARKLE_REPO="${{ github.repository }}" \
          SPARKLE_IS_PRERELEASE="$IS_PRERELEASE" \
          python3 scripts/update-sparkle.py

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/IconChanger.dmg
            build/*.delta
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push appcast
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          cp IconChanger/Resources/sparkle.xml /tmp/sparkle.xml.updated
          git fetch origin main
          git checkout -f -B main origin/main
          cp /tmp/sparkle.xml.updated IconChanger/Resources/sparkle.xml
          git add IconChanger/Resources/sparkle.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "release: update appcast for ${TAG}"
          git push origin main

      - name: Trigger docs redeploy
        if: startsWith(github.ref, 'refs/tags/')
        run: gh workflow run docs.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: startsWith(github.ref, 'refs/tags/') && env.IS_PRERELEASE != 'true'
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/IconChanger.dmg"
          SHA256=$(shasum -a 256 build/IconChanger.dmg | cut -d ' ' -f 1)

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Bengerthelorf/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap && mkdir -p Casks

          cat > Casks/iconchanger.rb <<CASK
          cask "iconchanger" do
            version "${VERSION}"
            sha256 "${SHA256}"
            url "${DMG_URL}"
            name "IconChanger"
            desc "Customize macOS app icons"
            homepage "https://github.com/Bengerthelorf/macIconChanger"
            depends_on macos: ">= :ventura"
            app "IconChanger.app"
            zap trash: [
              "~/Library/Preferences/com.zhuhaoyu.IconChanger.plist",
              "~/.iconchanger",
            ]
          end
          CASK

          sed -i '' 's/^          //' Casks/iconchanger.rb
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/iconchanger.rb
          git diff --cached --quiet && echo "No changes" || git commit -m "Update iconchanger to ${TAG}"
          git push origin main

      - name: Cleanup keychain
        if: always() && startsWith(github.ref, 'refs/tags/')
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
