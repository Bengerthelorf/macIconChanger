name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project IconChanger.xcodeproj -scheme IconChanger

      - name: Build (CI check)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          xcodebuild build \
            -project IconChanger.xcodeproj \
            -scheme IconChanger \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild archive \
            -project IconChanger.xcodeproj \
            -scheme IconChanger \
            -configuration Release \
            -archivePath build/IconChanger.xcarchive \
            -quiet

      - name: Export app
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Extract .app from archive directly (no notarization needed)
          cp -R build/IconChanger.xcarchive/Products/Applications/IconChanger.app build/

      - name: Create DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p build/dmg
          cp -R build/IconChanger.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "IconChanger" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/IconChanger.dmg

      - name: Sign DMG with Sparkle EdDSA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          # Download Sparkle tools
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.8.0/Sparkle-2.8.0.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIGN_UPDATE="/tmp/sparkle/bin/sign_update"

          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("$SIGN_UPDATE" build/IconChanger.dmg --ed-key-file /tmp/sparkle_key)
          rm -f /tmp/sparkle_key

          DMG_SIZE=$(stat -f%z build/IconChanger.dmg)
          echo "DMG_SIZE=$DMG_SIZE" >> $GITHUB_ENV

          ED_SIG=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          echo "ED_SIGNATURE=$ED_SIG" >> $GITHUB_ENV

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" ${PREVIOUS_TAG}..HEAD -- ':!IconChanger/Resources/sparkle.xml' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG}" >> CHANGELOG.md
          else
            git log --pretty=format:"- %s" >> CHANGELOG.md
          fi

      - name: Update sparkle.xml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_NUMBER=$(echo "$VERSION" | tr -d '.')
          TAG=${GITHUB_REF#refs/tags/}
          PUBDATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/IconChanger.dmg"

          python3 -c "
          import sys, re
          item = '''        <item>
                      <title>Version $VERSION</title>
                      <link>https://github.com/${{ github.repository }}</link>
                      <sparkle:version>$BUILD_NUMBER</sparkle:version>
                      <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                      <pubDate>$PUBDATE</pubDate>
                      <enclosure url=\"$DOWNLOAD_URL\"
                      sparkle:edSignature=\"$ED_SIGNATURE\" length=\"$DMG_SIZE\"
                      type=\"application/octet-stream\"/>
                  </item>'''
          xml = open('IconChanger/Resources/sparkle.xml').read()
          # Remove existing entries for this version to avoid duplicates on re-release
          xml = re.sub(
              r'\s*<item>\s*<title>Version ' + re.escape('$VERSION') + r'</title>.*?</item>',
              '', xml, flags=re.DOTALL
          )
          marker = '<title>IconChanger</title>'
          idx = xml.find(marker)
          if idx == -1:
              sys.exit('marker not found')
          insert_pos = xml.index('\n', idx) + 1
          xml = xml[:insert_pos] + item + '\n' + xml[insert_pos:]
          open('IconChanger/Resources/sparkle.xml', 'w').write(xml)
          "

      - name: Commit and push appcast
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          cp IconChanger/Resources/sparkle.xml /tmp/sparkle.xml.updated
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/sparkle.xml.updated IconChanger/Resources/sparkle.xml
          git add IconChanger/Resources/sparkle.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "release: update appcast for ${GITHUB_REF#refs/tags/}"
          git push origin main

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/IconChanger.dmg
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          TAG=${GITHUB_REF#refs/tags/}
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/IconChanger.dmg"

          SHA256=$(shasum -a 256 build/IconChanger.dmg | cut -d ' ' -f 1)

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Bengerthelorf/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Casks

          cat > Casks/iconchanger.rb <<CASK
          cask "iconchanger" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${DMG_URL}"
            name "IconChanger"
            desc "Customize macOS app icons"
            homepage "https://github.com/Bengerthelorf/macIconChanger"

            depends_on macos: ">= :ventura"

            app "IconChanger.app"

            zap trash: [
              "~/Library/Preferences/com.zhuhaoyu.IconChanger.plist",
              "~/.iconchanger",
            ]
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' Casks/iconchanger.rb

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/iconchanger.rb
          git diff --cached --quiet && echo "No changes" || git commit -m "Update iconchanger to ${TAG}"
          git push origin main

      - name: Cleanup keychain
        if: always() && startsWith(github.ref, 'refs/tags/')
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
